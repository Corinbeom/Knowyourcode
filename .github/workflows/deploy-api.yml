name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy FastAPI to OCI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.OCI_APP_DIR || '/home/ubuntu/Knowyourcode' }}"
            cd "$APP_DIR"

            git fetch origin main
            git pull --ff-only origin main

            if [ ! -d apps/api/.venv ]; then
              python3 -m venv apps/api/.venv
            fi

            apps/api/.venv/bin/pip install -r apps/api/requirements.txt

            sudo /usr/bin/systemctl restart knowyourcode-api
            sudo /usr/bin/systemctl is-active --quiet knowyourcode-api

            sleep 2
            curl -fsS http://127.0.0.1:8000/health
